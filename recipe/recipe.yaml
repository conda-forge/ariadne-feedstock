schema_version: 1

context:
  name: ariadne
  version: "0.29.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ariadne-${{ version }}.tar.gz
  sha256: c6c79f459ed747b6698aeabb5eb2f35913791fec7d488f42344fe79d5edb469d

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - hatchling
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - graphql-core >=3.2.0
    - starlette >0.17,<1.0
    - typing_extensions >=3.6.0

tests:
  - python:
      imports:
        - ariadne
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Ariadne is a Python library for implementing GraphQL servers.
  license: BSD-3-Clause
  license_file:
    - LICENSE
  homepage: https://ariadnegraphql.org/
  repository: https://github.com/mirumee/ariadne
  documentation: https://ariadnegraphql.org/docs/intro

extra:
  recipe-maintainers:
    - thewchan
