schema_version: 1

context:
  name: ariadne
  version: "1.0.0"

package:
  name: ${{ name|lower }}
  version: ${{ version }}

source:
  url: https://pypi.org/packages/source/${{ name[0] }}/${{ name }}/ariadne-${{ version }}.tar.gz
  sha256: e98b8705c273cf7f04260c884a05d70f15a1795394942ba913eb874399a0c814

build:
  number: 0
  noarch: python
  script: ${{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - hatchling
    - pip
    - python ${{ python_min }}.*
  run:
    - python >=${{ python_min }}
    - graphql-core >=3.2.0
    - starlette >0.17,<1.0
    - typing_extensions >=4.6.0

tests:
  - python:
      imports:
        - ariadne
      pip_check: true
      python_version: ${{ python_min }}.*

about:
  summary: Ariadne is a Python library for implementing GraphQL servers.
  license: BSD-3-Clause
  license_file:
    - LICENSE
  homepage: https://ariadnegraphql.org/
  repository: https://github.com/mirumee/ariadne
  documentation: https://ariadnegraphql.org/docs/intro

extra:
  recipe-maintainers:
    - thewchan
